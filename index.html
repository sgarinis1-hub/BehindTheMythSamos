<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MythosGate Samos - AI Pythagoras</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 10; background: rgba(0,0,0,0.8); color: #FFD700; padding: 12px; border-radius: 10px; border: 1px solid #FFD700; font-size: 12px; }
        .ai-container { position: fixed; bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; gap: 10px; }
        #response-box { background: rgba(0,0,0,0.85); color: white; padding: 15px; width: 85%; border-radius: 15px; display: none; text-align: center; border: 1px solid #D4AF37; max-height: 150px; overflow-y: auto; }
        input { padding: 15px; border-radius: 25px; border: 2px solid #D4AF37; width: 75%; font-size: 16px; outline: none; }
        button { background: #D4AF37; color: black; border: none; padding: 15px 35px; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="hud">
        <b>MythosGate: ΣΑΜΟΣ</b><br>
        <span id="gps-status">Αναζήτηση GPS...</span>
    </div>

    <div class="ai-container">
        <div id="response-box"></div>
        <input type="text" id="user-question" placeholder="Ρώτησε τον Πυθαγόρα...">
        <button onclick="askAI()">ΣΥΝΟΜΙΛΙΑ</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;" vr-mode-ui="enabled: false">
        <a-assets>
            <a-asset-item id="pyth-model" src="https://arjs-cors-proxy.herokuapp.com/https://raw.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb"></a-asset-item>
        </a-assets>

        <a-entity id="monument" gltf-model="#pyth-model" gps-entity-place="latitude: 37.7559575; longitude: 26.9763882;" scale="1 1 1" look-at="[gps-camera]"></a-entity>
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        const API_KEY = "ΒΑΛΕ_ΕΔΩ_ΤΟ_ΚΛΕΙΔΙ_ΣΟΥ";

        // Dev Mode Fix
        window.addEventListener('load', () => {
            navigator.geolocation.getCurrentPosition((pos) => {
                const platLat = 37.7559575;
                const dist = Math.abs(pos.coords.latitude - platLat);
                if (dist > 0.001) {
                    const el = document.getElementById('monument');
                    el.removeAttribute('gps-entity-place');
                    el.setAttribute('position', '0 -1 -5');
                    document.getElementById('gps-status').innerText = "Dev Mode (Σπίτι)";
                } else {
                    document.getElementById('gps-status').innerText = "Live: Πλατεία Πυθαγόρα";
                }
            });
        });

        async function askAI() {
            const question = document.getElementById('user-question').value;
            const box = document.getElementById('response-box');
            if (!question) return;

            box.style.display = "block";
            box.innerText = "Ο Πυθαγόρας αναλογίζεται...";

            const prompt = `Είσαι ο αρχαίος μαθηματικός Πυθαγόρας από τη Σάμο. 
                           Απάντησε σύντομα (μέχρι 25 λέξεις) με ύφος σοφό και μαθηματικό 
                           στην ερώτηση: "${question}"`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const answer = data.candidates[0].content.parts[0].text;
                box.innerText = answer;
            } catch (err) {
                box.innerText = "Οι θεοί των αριθμών σιωπούν (Σφάλμα σύνδεσης).";
            }
        }
    </script>
</body>
</html>
