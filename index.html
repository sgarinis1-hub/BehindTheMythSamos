<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samos MythosGate - AR Prototype</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #status-panel {
            position: fixed; top: 10px; left: 10px; z-index: 1000;
            background: rgba(0,0,0,0.8); color: #D4AF37; padding: 10px;
            border-radius: 8px; border: 1px solid #D4AF37; font-size: 13px;
        }
        .controls {
            position: fixed; bottom: 30px; width: 100%;
            display: flex; justify-content: center; z-index: 1000;
        }
        button {
            background: #D4AF37; color: white; border: none; padding: 15px 30px;
            border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="status-panel">
        <b>MythosGate Samos</b><br>
        <span id="gps-text">Αναζήτηση GPS...</span>
    </div>

    <div class="controls">
        <button onclick="alert('Χαίρε Σάμιε! Είμαι ο Πυθαγόρας.')">ΜΙΛΑ ΜΕ ΤΟΝ ΠΥΘΑΓΟΡΑ</button>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;">

        <a-assets>
            <a-asset-item id="ancient-model" src="https://arjs-cors-proxy.herokuapp.com/https://raw.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb"></a-asset-item>
        </a-assets>

        <a-entity 
            gltf-model="#ancient-model" 
            gps-entity-place="latitude: 37.7559575; longitude: 26.9763882;" 
            scale="15 15 15"
            look-at="[gps-camera]"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 15000">
        </a-entity>

        <a-camera gps-camera="minDistance: 0; positionMinAccuracy: 1000;" rotation-reader></a-camera>

    </a-scene>

    <script>
        // Ενημέρωση όταν το GPS βρει το σημείο
        window.addEventListener('gps-entity-place-added', () => {
            document.getElementById('gps-text').innerText = "Το μνημείο εντοπίστηκε!";
            document.getElementById('gps-text').style.color = "lime";
        });
    </script>

</body>
</html>
