<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MythosGate Samos - AI Pythagoras</title>

    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 10; background: rgba(0,0,0,0.8); color: #FFD700; padding: 12px; border-radius: 10px; border: 1px solid #FFD700; font-size: 12px; }
        
        /* Η απόλυτη διόρθωση για το κεντράρισμα */
        .ai-container { 
            position: fixed; 
            bottom: 30px; 
            left: 0; /* Αυτό έλειπε και το έστελνε αριστερά! */
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            z-index: 9999; /* Το βάζουμε πάνω από όλα */
            gap: 10px; 
        }
        
        #response-box { 
            box-sizing: border-box;
            background: rgba(0,0,0,0.85); color: white; padding: 15px; width: 90%; 
            border-radius: 15px; display: none; text-align: center; 
            border: 1px solid #D4AF37; max-height: 150px; overflow-y: auto; 
        }
        
        input { 
            box-sizing: border-box; /* Για να μην ξεχειλώνει */
            padding: 15px; border-radius: 25px; border: 2px solid #D4AF37; 
            width: 85%; font-size: 16px; outline: none; text-align: center; 
        }
        
        button { 
            background: #D4AF37; color: black; border: none; padding: 15px 35px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }
    </style>

</head>

<body style="margin: 0; overflow: hidden;">

    <div id="hud">
        <b>MythosGate: ΣΑΜΟΣ</b><br>
        <span id="gps-status">Αναζήτηση GPS...</span>
    </div>

    <div class="ai-container">
        <div id="response-box"></div>
        <input type="text" id="user-question" placeholder="Ρώτησε τον Πυθαγόρα...">
        <button onclick="askAI()">ΣΥΝΟΜΙΛΙΑ</button>
    </div>

    <a-scene 
    vr-mode-ui="enabled: false" 
    embedded 
    renderer="alpha: true; antialias: true;" 
    arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: false;">


    <script>
        // ----------------------------------------------------
        // 🥷 NINJA MOVE: Σπάμε το κλειδί στα δύο για το GitHub
        // ----------------------------------------------------
        
        // ΒΑΛΕ ΤΟ ΠΡΩΤΟ ΜΙΣΟ ΤΟΥ ΝΕΟΥ ΚΛΕΙΔΙΟΥ ΕΔΩ:
        const part1 = "AIzaSyBL4TvVPQYqY"; 
        
        // ΒΑΛΕ ΤΟ ΔΕΥΤΕΡΟ ΜΙΣΟ ΕΔΩ:
        const part2 = "7skvdZXqRaddrVVR4fmqBI"; 
        
        // Ο browser τα ενώνει αόρατα!
        const API_KEY = part1 + part2;

        // Dev Mode (Για να βλέπεις την πάπια στο σπίτι)
        window.addEventListener('load', () => {
            navigator.geolocation.getCurrentPosition((pos) => {
                const platLat = 37.7559575;
                const dist = Math.abs(pos.coords.latitude - platLat);
                if (dist > 0.001) {
                    const el = document.getElementById('monument');
                    el.removeAttribute('gps-entity-place');
                    el.setAttribute('position', '0 -1 -5');
                    document.getElementById('gps-status').innerText = "Dev Mode (Σπίτι)";
                } else {
                    document.getElementById('gps-status').innerText = "Live: Πλατεία Πυθαγόρα";
                }
            });
        });

        async function askAI() {
            const box = document.getElementById('response-box');
            const question = document.getElementById('user-question').value;
            
            if (!question) return;

            // Έλεγχος αν ξέχασες να βάλεις το κλειδί
            if (API_KEY.includes("ΒΑΛΕ_ΤΟ")) {
                box.style.display = "block";
                box.innerText = "Σύστημα: Πρέπει να βάλεις το δικό σου σπασμένο κλειδί στον κώδικα!";
                return;
            }

            box.style.display = "block";
            box.innerText = "Ο Πυθαγόρας αναλογίζεται...";

            const prompt = `Είσαι ο αρχαίος Έλληνας φιλόσοφος και μαθηματικός, Πυθαγόρας ο Σάμιος. Ο χρήστης σου κάνει μια ερώτηση. Θέλω να απαντήσεις ΑΜΕΣΑ και ΞΕΚΑΘΑΡΑ σε αυτό που σε ρωτάει, χωρίς να μιλάς με γρίφους. Να είσαι φιλικός, σαν ένας καλός δάσκαλος που εξηγεί τα πράγματα απλά. Μπορείς να χρησιμοποιείς παραδείγματα από τα μαθηματικά, τη μουσική ή τη γεωμετρία για να εξηγήσεις τη σκέψη σου, αλλά η προτεραιότητά σου είναι να δώσεις μια σωστή και κατανοητή απάντηση. Μίλα ελεύθερα, σε 2 με 4 προτάσεις (όχι πολύ τεράστια κείμενα, αλλά ούτε και μονολεκτικά). Η ερώτηση του χρήστη είναι: "${question}"`;


            try {
                // Χρησιμοποιούμε το πιο σύγχρονο μοντέλο
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();

                if (!response.ok) {
                    console.error("Google API Error:", data);
                    box.innerText = "Σφάλμα Google: " + (data.error?.message || "Άγνωστο λάθος");
                    return;
                }

                const answer = data.candidates[0].content.parts[0].text;
                box.innerText = answer;
            } catch (err) {
                box.innerText = "Σφάλμα Δικτύου: " + err.message;
            }
        }
    </script>
</body>
</html>
