<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MythosGate Smart AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #debug-ui { position: fixed; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 5px; font-size: 11px; }
        .ai-controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 1000; }
        button { background: #D4AF37; color: black; border: none; padding: 15px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="debug-ui">
        Κατάσταση: <span id="mode-text">Ανίχνευση τοποθεσίας...</span>
    </div>

    <div class="ai-controls">
        <button onclick="startAI()">ΡΩΤΗΣΕ ΤΟΝ ΠΥΘΑΓΟΡΑ</button>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <a-asset-item id="pythagoras" src="https://arjs-cors-proxy.herokuapp.com/https://raw.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb"></a-asset-item>
        </a-assets>

        <a-entity id="main-model" gltf-model="#pythagoras" scale="1 1 1" look-at="[camera]"></a-entity>

        <a-camera id="cam" gps-camera="minDistance: 0;" rotation-reader></a-camera>
    </a-scene>

    <script>
        const targetLat = 37.7559575;
        const targetLon = 26.9763882;
        const model = document.querySelector('#main-model');
        const modeText = document.querySelector('#mode-text');

        navigator.geolocation.watchPosition((pos) => {
            const userLat = pos.coords.latitude;
            const userLon = pos.coords.longitude;
            
            // Υπολογισμός απόστασης (απλοποιημένος)
            const dist = Math.sqrt(Math.pow(userLat - targetLat, 2) + Math.pow(userLon - targetLon, 2));

            if (dist < 0.001) { // Είσαι στην πλατεία (~100 μέτρα)
                modeText.innerText = "Mode: Πλατεία (GPS)";
                modeText.style.color = "lime";
                model.setAttribute('gps-entity-place', `latitude: ${targetLat}; longitude: ${targetLon};`);
                model.setAttribute('scale', '15 15 15');
            } else { // Είσαι στο σπίτι
                modeText.innerText = "Mode: Dev (Στατικό)";
                modeText.style.color = "cyan";
                model.removeAttribute('gps-entity-place');
                model.setAttribute('position', '0 -0.5 -3'); // Εμφάνιση στα 3 μέτρα μπροστά
                model.setAttribute('scale', '1 1 1');
            }
        }, (err) => {
            modeText.innerText = "Σφάλμα GPS: Χρήση Dev Mode";
            model.setAttribute('position', '0 -0.5 -3');
        }, { enableHighAccuracy: true });

        function startAI() {
            alert("Χαίρε! Είμαι ο Πυθαγόρας. Σε λίγο θα μπορώ να σου μιλήσω μέσω LLM.");
        }
    </script>
</body>
</html>
