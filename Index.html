<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Samos MythosGate - Πλατεία Πυθαγόρα</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <style>
        .ui-panel {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; text-align: center; width: 100%;
        }
        button {
            background: #D4AF37; color: white; border: none; padding: 15px 30px;
            border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div class="ui-panel">
        <button onclick="askSocrates()">ΡΩΤΑ ΤΟΝ ΣΩΚΡΑΤΗ</button>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-assets>
            <a-asset-item id="temple" src="https://arjs-cors-proxy.herokuapp.com/https://raw.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb"></a-asset-item>
        </a-assets>

        <a-entity 
            gltf-model="#temple" 
            gps-entity-place="latitude: 37.7559575; longitude: 26.9763882;" 
            scale="10 10 10"
            look-at="[gps-camera]">
        </a-entity>

        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        function askSocrates() {
            alert("Χαίρε Σάμιε! Είμαι ο Σωκράτης. Είσαι έτοιμος να μιλήσουμε για τη σοφία του Πυθαγόρα;");
            // Εδώ αργότερα θα μπει η σύνδεση με την AI φωνή που φτιάξαμε
        }
    </script>
</body>
</html>
